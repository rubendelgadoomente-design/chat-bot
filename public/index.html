<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Camper - Soporte al Cliente</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-overlay: rgba(255, 255, 255, 0.85);
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: flex-start; /* Evita que el tope se bloquee */
            justify-content: center;
            background-image: url('/background.jpg?v=1');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 0; /* Padding arriba y abajo para que respire */
            box-sizing: border-box;
        }

        .glass-container {
            max-width: 500px;
            width: 90%;
            padding: 30px;
            background: var(--bg-overlay);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8em;
            margin: 10px 0;
            letter-spacing: -0.5px;
        }

        .description {
            color: #555;
            font-size: 0.95em;
            margin-bottom: 25px;
        }

        .chat-area {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        #chat-window {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            text-align: left;
            scroll-behavior: smooth;
        }

        .input-bar {
            display: flex;
            padding: 15px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        #user-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(230, 126, 34, 0.2);
        }

        button {
            margin-left: 10px;
            padding: 10px 25px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(230, 126, 34, 0.4);
        }

        .logo-badge {
            display: inline-block;
            padding: 5px 15px;
            background: var(--accent-color);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 85%;
            line-height: 1.4;
        }

        .asistente { background: #f0f4f8; margin-right: auto; border-bottom-left-radius: 2px; }
        .tu { background: #fee2d5; margin-left: auto; border-bottom-right-radius: 2px; text-align: right; }

        .video-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #27ae60;
            color: white !important;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: bold;
            transition: background 0.3s;
        }

        .video-btn:hover {
            background: #2ecc71;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75em;
            color: #666;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <img src="/logo.jpg?v=1" alt="CamperBot Logo" style="width: 120px; margin-bottom: 20px;">
        <h1>¿Necesitas ayuda con tu Camper?</h1>
        <p class="description">Estamos aquí para que tu aventura no se detenga. Pregúntame sobre el gas, la batería o el agua.</p>
        
        <div class="chat-area">
            <div id="chat-window">
                <div class="message asistente">
                    <b>Asistente:</b> ¡Hola! ¿En qué puedo ayudarte con tu autocaravana hoy?
                </div>
            </div>
            <div class="input-bar">
                <input type="text" id="user-input" placeholder="Escribe tu duda aquí..." autocomplete="off">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>

        <script>
            const chatWindow = document.getElementById('chat-window');
            const userInput = document.getElementById('user-input');

            async function sendMessage() {
                const text = userInput.value.trim();
                if (!text) return;

                // Mostrar mensaje del usuario
                appendMessage('Tú', text, 'var(--primary-color)');
                userInput.value = '';

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                    const data = await response.json();
                    
                    // Mostrar respuesta del bot
                    appendMessage('Asistente', data.response, 'var(--accent-color)');
                } catch (error) {
                    appendMessage('Sistema', 'Error al conectar con el asistente.', 'red');
                }
            }

            function appendMessage(sender, text, color) {
                const div = document.createElement('div');
                const isBot = sender === 'Asistente';
                div.className = `message ${isBot ? 'asistente' : 'tu'}`;
                
                // Procesar links tipo [Texto](URL) y saltos de línea
                let processedText = text.replace(/\n/g, '<br>');
                processedText = processedText.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" class="video-btn">$1</a>');
                
                div.innerHTML = `<b>${sender}:</b> ${processedText}`;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            // Enviar con Enter
            userInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') sendMessage();
            });
        </script>

        <div class="footer">
            &copy; 2024 CamperBot Solutions - Impulsando el sector del Caravaning
        </div>
    </div>

</body>
</html>
